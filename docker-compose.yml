services:
  backend:
    build: ./backend
    container_name: financial_rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - docfinqa_data:/app/data/docfinqa
      - chroma_data:/app/data/chroma
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/financial_rag
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - DOCFINQA_DATA_DIR=/app/data/docfinqa
      - CHROMA_PERSIST_DIR=/app/data/chroma
    depends_on:
      - db
    
  db:
    image: postgres:16
    container_name: financial_rag_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_rag
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  chroma_data:
  docfinqa_data:
  huggingface_cache:
